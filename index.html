<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kindle Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #0d0d0d;
      --surface:       #161616;
      --border:        #2a2a2a;
      --text:          #f0ebe2;
      --text-muted:    #7a7065;
      --text-dim:      #4a4540;
      --accent:        #c9a96e;
      --highlight-col: #6ea8c9;
      --summary-col:   #8fc99a;
      --font:          'Outfit', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 5rem;
    }

    /* Loading */
    #loading { display: flex; gap: 8px; }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse {
      0%,100% { opacity:.3; transform:scale(.8); }
      50%      { opacity:1;  transform:scale(1); }
    }

    /* Error / empty */
    #error { color: #e07070; text-align: center; font-size: .95rem; }
    #error small { display:block; margin-top:.4rem; color: var(--text-dim); font-size:.75rem; font-family:monospace; }

    /* Card */
    #card {
      max-width: 780px;
      width: 100%;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .35s ease, transform .35s ease;
    }
    #card.visible { opacity:1; transform:translateY(0); }

    /* Badge */
    .badge {
      display: inline-block;
      font-size: .65rem;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 99px;
      margin-bottom: 2rem;
    }
    .badge-highlight { color:var(--highlight-col); background:rgba(110,168,201,.12); border:1px solid rgba(110,168,201,.2); }
    .badge-summary   { color:var(--summary-col);   background:rgba(143,201,154,.12); border:1px solid rgba(143,201,154,.2); }

    /* Note text */
    #note-text {
      font-size: clamp(.75rem, 2vw, 1.1rem);
      font-weight: 300;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 2.5rem;
    }

    /* Footer */
    #note-footer { display:flex; flex-direction:column; gap:.35rem; }

    #book-title {
      background: none; border: none; padding: 0;
      font-family: var(--font);
      font-size: 1rem; font-weight: 500;
      color: var(--text); text-align: left;
      display: inline-flex; align-items: center; gap: .4rem;
      cursor: default;
    }
    #book-title.clickable { color:var(--accent); cursor:pointer; transition:opacity .15s; }
    #book-title.clickable:hover { opacity:.75; }
    .summary-dot { font-size:1.1rem; opacity:.6; }

    #author { font-size:.9rem; color:var(--text-muted); font-weight:300; }

    /* Next button */
    #controls {
      position: fixed; bottom: 2rem;
      left: 50%; transform: translateX(-50%);
    }
    #next-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: .85rem; font-weight: 400;
      letter-spacing: .03em;
      padding: .6rem 1.4rem;
      border-radius: 99px;
      cursor: pointer;
      display: flex; align-items: center; gap: .5rem;
      transition: border-color .15s, color .15s, background .15s;
    }
    #next-btn:hover { border-color:var(--text-muted); color:var(--text); background:rgba(255,255,255,.04); }
    #next-btn:hover .arrow { transform:translateX(3px); }
    .arrow { transition:transform .15s; }

    /* Modal */
    #modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
      z-index: 100;
      animation: fadeIn .2s ease;
    }
    #modal-backdrop.hidden { display:none; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      max-width: 640px; width: 100%;
      position: relative;
      max-height: 85vh; overflow-y: auto;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }

    #modal-close {
      position:absolute; top:1.2rem; right:1.2rem;
      background:none; border:none;
      color:var(--text-dim); font-size:.9rem;
      cursor:pointer; padding:4px 8px; border-radius:4px;
      transition:color .15s;
    }
    #modal-close:hover { color:var(--text); }
    #modal-label { font-size:.65rem; font-weight:500; letter-spacing:.12em; text-transform:uppercase; color:var(--summary-col); margin-bottom:.75rem; }
    #modal-book { font-size:1.3rem; font-weight:600; margin-bottom:.3rem; }
    #modal-author { font-size:.9rem; color:var(--text-muted); font-weight:300; }
    #modal-divider { height:1px; background:var(--border); margin:1.5rem 0; }
    #modal-text { font-size:1.05rem; line-height:1.7; font-weight:300; }
    #modal-empty { font-size:.9rem; color:var(--text-muted); }

    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

    @media (max-width:600px) {
      #note-text { font-size:.675rem; }
      #modal { padding:1.75rem; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div id="error" style="display:none"></div>

    <div id="card">
      <div id="badge" class="badge"></div>
      <p id="note-text"></p>
      <div id="note-footer">
        <button id="book-title"></button>
        <span id="author"></span>
      </div>
    </div>

    <div id="controls" style="display:none">
      <button id="next-btn">Next note <span class="arrow">→</span></button>
    </div>
  </div>

  <div id="modal-backdrop" class="hidden">
    <div id="modal">
      <button id="modal-close">✕</button>
      <div id="modal-label">Book summary</div>
      <h2 id="modal-book"></h2>
      <p id="modal-author"></p>
      <div id="modal-divider"></div>
      <p id="modal-text"></p>
    </div>
  </div>

  <script>
    let allNotes = [];
    let current = null;

    const $ = id => document.getElementById(id);

    function pickRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function isType(note, keyword) {
      return note.type.toLowerCase().includes(keyword);
    }

    function hasSummary(book) {
      return allNotes.some(n => n.book.toLowerCase() === book.toLowerCase() && isType(n, 'summary'));
    }

    function getSummary(book) {
      return allNotes.find(n => n.book.toLowerCase() === book.toLowerCase() && isType(n, 'summary'));
    }

    function showNote(note) {
      current = note;
      const highlight = isType(note, 'highlight');

      $('badge').textContent = highlight ? 'Highlight' : 'Summary';
      $('badge').className = 'badge ' + (highlight ? 'badge-highlight' : 'badge-summary');
      $('note-text').textContent = note.annotation;

      const btn = $('book-title');
      const summaryExists = hasSummary(note.book);
      btn.innerHTML = note.book + (summaryExists ? ' <span class="summary-dot">◦</span>' : '');
      btn.className = summaryExists ? 'clickable' : '';
      btn.onclick = summaryExists ? openModal : null;

      $('author').textContent = note.author ? '— ' + note.author : '';
    }

    function fadeToNote(note) {
      const card = $('card');
      card.classList.remove('visible');
      closeModal();
      setTimeout(() => {
        showNote(note);
        setTimeout(() => card.classList.add('visible'), 30);
      }, 350);
    }

    function nextNote() {
      fadeToNote(pickRandom(allNotes));
    }

    function openModal() {
      if (!current) return;
      const summary = getSummary(current.book);
      $('modal-book').textContent = current.book;
      $('modal-author').textContent = current.author || '';
      $('modal-text').textContent = summary ? summary.annotation : 'No summary found for this book.';
      $('modal-backdrop').classList.remove('hidden');
    }

    function closeModal() {
      $('modal-backdrop').classList.add('hidden');
    }

    // Events
    $('next-btn').onclick = nextNote;
    $('modal-close').onclick = closeModal;
    $('modal-backdrop').onclick = e => { if (e.target === $('modal-backdrop')) closeModal(); };

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
      if (!$('modal-backdrop').classList.contains('hidden')) return;
      if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); nextNote(); }
    });

    // Load notes
    fetch('/api/notes')
      .then(r => r.json())
      .then(data => {
        if (data.error) throw new Error(data.error);
        allNotes = data.notes;
        $('loading').style.display = 'none';

        if (allNotes.length === 0) {
          $('error').style.display = 'block';
          $('error').textContent = 'No notes found in your sheet.';
          return;
        }

        showNote(pickRandom(allNotes));
        setTimeout(() => $('card').classList.add('visible'), 50);
        $('controls').style.display = 'block';
      })
      .catch(err => {
        $('loading').style.display = 'none';
        $('error').style.display = 'block';
        $('error').innerHTML = 'Could not load notes.<br><small>' + err.message + '</small>';
      });
  </script>
</body>
</html>
